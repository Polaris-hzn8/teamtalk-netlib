# imcore 日志配置文件
# 所有 SLog 实例共用这份配置，程序启动时由 ImcoreLogSystem::init() 读取
#
# 修改此文件后需重启进程生效（如需热重载，请使用 ImcoreLogSystem::setLevel() 动态调整级别）

# 日志文件路径（为空则不写文件）
log_path = ./log/imcore.log

# 日志级别：trace / debug / info / warn / error / fatal / off
level = info

# 是否同时输出到控制台
console = true

# 是否启用异步写入（高并发场景建议开启）
async = true

# 单个日志文件最大大小（MB）
max_size_mb = 10

# 最多保留多少个轮转文件
max_files = 5

# 异步队列大小（async=true 时生效）
queue_size = 8192
